<div class="single-sidebar-widget post-category-widget">
    <h4 class="category-title">Post Categories</h4>
    <ul class="cat-list">
        {% for name, cnt in categories.items %}
            <li>
                <a href="{% url 'blog:category' name=nmae %}" class="d-flex justify-content-between">
                    <p> {{name}} </p>
                    <p> {{cnt}} </p>
                </a>
            </li>
        {% endfor %}
    </ul>
</div>
